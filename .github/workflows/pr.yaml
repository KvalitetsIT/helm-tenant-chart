name: PR

on:
  pull_request:

permissions: {}

jobs:
  changelog:
    name: Validating changelog
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check CHANGELOG.md is updated
        run: |
          if ! git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qE '^charts/(tenant|project)/CHANGELOG\.md$'; then
            echo "Neither charts/tenant/CHANGELOG.md nor charts/project/CHANGELOG.md was updated. Please document your changes before merging."
            exit 1
          fi

  docs:
    name: Validating docs
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Generate docs
        run: make docs

      - name: Check for uncommitted doc changes
        run: |
          if ! git diff --exit-code -- charts/tenant/README.md charts/project/README.md; then
            echo ""
            echo "Chart READMEs are out of date. Run 'make docs' locally and commit the result."
            exit 1
          fi

  lint-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: "v3.17.0"

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: 3.x

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --config ct.yaml)
          echo "Changed charts:"
          echo "$changed"

          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Add Helm repositories
        run: |
          helm repo add kvalitetsit https://raw.githubusercontent.com/KvalitetsIT/helm-repo/master/
          helm repo update

      - name: Run chart-testing (lint)
        run: ct lint --config ct.yaml

      - name: Kubernetes KinD Cluster
        id: kind
        uses: helm/kind-action@92086f6be054225fa813e0a4b13787fc9088faab # v1.13.0
        if: steps.list-changed.outputs.changed == 'true'

      - name: Update chart dependencies
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          helm dependency update charts/project
          helm dependency update charts/tenant

      - name: Install CRDs
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          wait_for_crd() {
            local crd="$1"
            kubectl wait --for=condition=Established --timeout=60s "crd/${crd}" \
              || kubectl wait --for=condition=Established --timeout=60s "crd/${crd}"
          }

          kubectl apply -f https://raw.githubusercontent.com/bitnami-labs/sealed-secrets/refs/tags/v0.34.0/helm/sealed-secrets/crds/bitnami.com_sealedsecrets.yaml
          wait_for_crd sealedsecrets.bitnami.com

          kubectl apply -f https://raw.githubusercontent.com/cilium/cilium/refs/tags/v1.19.0/pkg/k8s/apis/cilium.io/client/crds/v2/ciliumnetworkpolicies.yaml
          wait_for_crd ciliumnetworkpolicies.cilium.io

          kubectl apply -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/crds/appproject-crd.yaml
          wait_for_crd appprojects.argoproj.io

          kubectl apply -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/crds/application-crd.yaml
          wait_for_crd applications.argoproj.io

      - name: Pre-create required namespaces
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          # argocd: AppProject resources default to namespace: argocd (configurable via argoNamespace)
          # acme:   Application resources go to namespace: .Values.tenantName (acme in all project CI files)
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace acme --dry-run=client -o yaml | kubectl apply -f -

      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --config ct.yaml
