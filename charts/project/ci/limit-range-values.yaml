tenantName: acme
projectName: inventory
tenantAppProjectName: acme-apps

application:
  source:
    path: inventory/apps
    repoURL: https://github.com/example/tenant-repo
    targetRevision: "main"

resourceQuota:
  spec:
    hard:
      limits.cpu: "4"
      limits.memory: 8Gi
      requests.storage: 100Gi

limitRange:
  enabled: true
  spec:
    limits:
      - type: Container
        default:
          cpu: 500m
          memory: 512Mi
        defaultRequest:
          cpu: 100m
          memory: 128Mi
        max:
          cpu: "2"
          memory: 2Gi
