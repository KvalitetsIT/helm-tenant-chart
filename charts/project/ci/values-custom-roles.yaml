tenantName: acme
projectName: inventory
tenantAppProjectName: acme-apps

namespace:
  labels:
    environment: production
  annotations:
    team: inventory

application:
  source:
    path: inventory/apps
    repoURL: https://github.com/example/tenant-repo
    targetRevision: "main"
  syncPolicy: {}  # no automated sync

resourceQuota:
  spec:
    hard:
      limits.cpu: "4"
      limits.memory: 8Gi
      requests.storage: 100Gi

appProject:
  roles:
    viewer:
      description: "Read-only access to {project} workloads"
      groups:
        - "{tenant}-viewer"
      policies:
        - "applications, get, {project}/{tenant}/*, allow"
        - "logs, get, {project}/*, allow"
    developer:
      description: "Can sync and all actions on {project} workloads"
      groups:
        - "{tenant}-developer"
      policies:
        - "applications, get, {project}/{tenant}/*, allow"
        - "logs, get, {project}/*, allow"
        - "applications, update, {project}/{tenant}/*, allow"
        - "applications, update/*, {project}/{tenant}/*, allow"
        - "applications, delete, {project}/{tenant}/*, allow"
        - "applications, delete/*, {project}/{tenant}/*, allow"
        - "applications, sync, {project}/{tenant}/*, allow"
        - "applications, action/*, {project}/{tenant}/*, allow"
    ops:
      description: "Ops access to {project}"
      groups:
        - inventory-ops@company.com
      policies:
        - "applications, *, {project}/{tenant}/*, allow"
        - "logs, get, {project}/*, allow"
