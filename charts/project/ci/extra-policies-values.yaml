tenantName: acme
projectName: inventory
tenantAppProjectName: acme-apps

application:
  source:
    path: inventory/apps
    repoURL: https://github.com/example/tenant-repo
    targetRevision: "main"

resourceQuota:
  spec:
    hard:
      limits.cpu: "4"
      limits.memory: 8Gi
      requests.storage: 100Gi

templates:
  networkPolicies:
    share-api:
      podSelector:
        matchLabels:
          app: my-api
      policyTypes:
        - Ingress
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: consumer-namespace
              podSelector:
                matchLabels:
                  app: consumer
          ports:
            - port: 8080
    consume-database:
      podSelector: {}
      policyTypes:
        - Egress
      egress:
        - to:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: database-namespace
              podSelector:
                matchLabels:
                  app: postgres
          ports:
            - port: 5432
  ciliumNetworkPolicies:
    allow-external-api:
      endpointSelector:
        matchLabels:
          app: my-app
      egress:
        - toFQDNs:
            - matchName: "api.example.com"
            - matchPattern: "*.storage.azure.com"
          toPorts:
            - ports:
                - port: "443"
                  protocol: TCP
