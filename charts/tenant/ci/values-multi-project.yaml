projectDefaults:
  application:
    source:
      repoURL: "https://github.com/example/tenant-repo"
      targetRevision: "main"
  resourceQuota:
    spec:
      hard:
        limits.cpu: "4"        # default quota applied to all projects
        limits.memory: "8Gi"
        requests.storage: "100Gi"

projects:
  inventory:
    application:
      source:
        path: "inventory/apps"

  reporting:
    application:
      source:
        path: "reporting/apps"
    resourceQuota:
      spec:
        hard:
          limits.cpu: "8"        # override the default quota for this project
          limits.memory: "16Gi"
          requests.storage: "200Gi"

  data:
    application:
      source:
        path: "data/apps"
    resourceQuota:
      spec:
        hard:
          limits.cpu: "16"
          limits.memory: "32Gi"
          requests.storage: "500Gi"
